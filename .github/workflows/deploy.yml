name: Deploy

# Runs after CI succeeds on main (so we never deploy a red build), or manually.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Never let two deploys overlap.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # Only on a successful CI run (or a manual dispatch).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy over SSH
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_HOST}" ] || [ -z "${SSH_USER}" ] || [ -z "${SSH_KEY}" ]; then
            echo "Deploy secrets (DEPLOY_HOST / DEPLOY_USER / DEPLOY_SSH_KEY) not set — skipping."
            exit 0
          fi
          PORT="${SSH_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "${SSH_KEY}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${PORT}" -H "${SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_deploy -p "${PORT}" "${SSH_USER}@${SSH_HOST}" \
            'cd /opt/lumina && git pull --ff-only && docker compose pull && docker compose up -d && docker image prune -f'
