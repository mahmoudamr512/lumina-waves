name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# The Next.js app lives in the lumina/ subdirectory.
defaults:
  run:
    working-directory: lumina

env:
  DATABASE_URL: postgresql://lumina:lumina@localhost:5432/lumina
  AUTH_SECRET: ci-secret-not-for-prod
  SEED_ADMIN_PASSWORD: ci-admin-pw
  STORAGE_DIR: ./.storage

jobs:
  quality:
    name: Lint · Typecheck · Unit · Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lumina
          POSTGRES_PASSWORD: lumina
          POSTGRES_DB: lumina
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U lumina"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lumina/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run test
      - run: npm run build

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    env:
      CI: "true"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lumina
          POSTGRES_PASSWORD: lumina
          POSTGRES_DB: lumina
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U lumina"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lumina/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
