name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# The Next.js app lives in the lumina/ subdirectory.
defaults:
  run:
    working-directory: lumina

env:
  DATABASE_URL: postgresql://lumina:lumina@localhost:5432/lumina
  AUTH_SECRET: ci-secret-not-for-prod
  SEED_ADMIN_PASSWORD: ci-admin-pw
  STORAGE_DIR: ./.storage
  # Web push (throwaway VAPID keypair for CI; real keys come from secrets in prod)
  VAPID_PUBLIC_KEY: BNK18_Bte16xuC-AEgQFPO6CKyBB4enZgqviyACsS_iMGvlVkWypsyAIWZGPG2ZUVkW6oduuONQCBttHb7974AM
  VAPID_PRIVATE_KEY: E0nW-4xwNs-q0NUy5jbLapj8HZrsh7qKDYR3PNWUSkM
  VAPID_SUBJECT: mailto:ops@luminawaves.com
  NEXT_PUBLIC_VAPID_PUBLIC_KEY: BNK18_Bte16xuC-AEgQFPO6CKyBB4enZgqviyACsS_iMGvlVkWypsyAIWZGPG2ZUVkW6oduuONQCBttHb7974AM

jobs:
  quality:
    name: Lint · Typecheck · Unit · Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lumina
          POSTGRES_PASSWORD: lumina
          POSTGRES_DB: lumina
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U lumina"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lumina/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      # Chromium is needed by the unit suite (PDF renderer test uses Playwright).
      - run: npx playwright install --with-deps chromium
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run test
      - run: npm run build

  docker:
    name: Docker image build (deploy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Builds the production image (validates Dockerfile on PRs) and pushes it to
      # GHCR on main so the server can `docker compose pull` instead of building
      # on the (small) VPS. Context is ./lumina (the action ignores the run-step
      # default working-directory).
      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: ./lumina
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/mahmoudamr512/lumina-waves:latest
            ghcr.io/mahmoudamr512/lumina-waves:${{ github.sha }}

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    env:
      CI: "true"
      REDIS_URL: redis://localhost:6379
      MEILI_HOST: http://localhost:7700
      MEILI_KEY: devkey
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lumina
          POSTGRES_PASSWORD: lumina
          POSTGRES_DB: lumina
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U lumina"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      meili:
        image: getmeili/meilisearch:v1.10
        env:
          MEILI_MASTER_KEY: devkey
        ports: ["7700:7700"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lumina/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
